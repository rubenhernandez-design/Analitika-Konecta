<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Analítica by Konecta</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .loader {
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #00c6ff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #00c6ff;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    .btn:hover {
      background: #009ec3;
    }
  </style>

  <script>
    // Redirección automática después de 2 segundos
    setTimeout(function(){
      window.location.href = "https://script.google.com/a/macros/konecta.com/s/AKfycbzpVy65V4GV-nLq0p71nQB0bHoRAmQP1RDCMJ7EMtgmYWL6UgkXGTtl3sMD-IaovA9g/exec";
    }, 2000);
  </script>
</head>

<body>
  <div class="container">
    <h1>Analítica by Konecta</h1>
    <p>Cargando aplicación, por favor espera...</p>
    <div class="loader"></div>

    <button class="btn" onclick="window.location.href='https://script.google.com/a/macros/konecta.com/s/AKfycbzpVy65V4GV-nLq0p71nQB0bHoRAmQP1RDCMJ7EMtgmYWL6UgkXGTtl3sMD-IaovA9g/exec'">
      Ir ahora
    </button>
  </div>
</body>
</html>
